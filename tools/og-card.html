<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #131118; overflow: hidden; }
  .card { position: relative; width: 1200px; height: 630px; background: #131118; }

  /* Right panel: the §7c title art (isolated render, no type) —
     arch through the light pool, tiny figure. */
  .shot {
    position: absolute; right: 0; top: 0;
    width: 720px; height: 630px; overflow: hidden;
  }
  .shot img {
    position: absolute;
    width: 720px;
    left: 0;
    top: -215px;                 /* pool + figure in frame; the arch apex may break frame */
    image-rendering: pixelated;
  }
  /* Blend the seam into the card background */
  .shot::after {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(90deg, #131118 0%, rgba(19,17,24,0) 38%),
      linear-gradient(0deg, rgba(19,17,24,.85) 0%, rgba(19,17,24,0) 18%),
      linear-gradient(180deg, rgba(19,17,24,.6) 0%, rgba(19,17,24,0) 14%);
  }

  .text {
    position: absolute; left: 64px; top: 0; height: 630px; width: 560px;
    display: flex; flex-direction: column; justify-content: center;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: 98px;
    line-height: 1.02;
    letter-spacing: 2px;
    color: #d9c9a3;
    text-shadow: 0 0 24px rgba(217, 201, 163, 0.18);
  }
  .tag {
    margin-top: 34px;
    font-family: Consolas, 'Courier New', monospace;
    font-weight: 700;
    font-size: 23px;
    line-height: 1.65;
    color: #8f8b81;
  }
  .tag .cursor {
    display: inline-block; width: 12px; height: 22px;
    background: #79c489; vertical-align: -3px; margin-left: 6px;
  }
</style>
<div class="card">
  <div class="shot">
    <img src="file:///C:/Users/Mercardib/OneDrive/Documents/Coding/TheKindMachine/notes/card-title.png">
  </div>
  <div class="text">
    <h1>THE KIND<br>MACHINE</h1>
    <div class="tag">
      it is rebuilding the last day<br>
      of the world. it asks what you<br>
      remember. it disagrees.<span class="cursor"></span>
    </div>
  </div>
</div>
